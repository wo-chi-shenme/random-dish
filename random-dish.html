<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container { max-width: 420px; margin: 0 auto; }
        h1 { text-align: center; color: white; font-size: 24px; margin-bottom: 20px; }
        .filter-section {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .filter-title { color: white; font-size: 12px; margin-bottom: 8px; }
        .filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .filter-tag {
            padding: 6px 12px;
            font-size: 12px;
            border: 1.5px solid white;
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }
        .filter-tag.active { background: white; color: #667eea; }
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 15px;
            min-height: 150px;
        }
        .result-emoji { font-size: 48px; margin-bottom: 10px; }
        .result-name { font-size: 22px; color: #333; font-weight: bold; margin-bottom: 5px; }
        .result-tags { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .result-tag { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
        .tag-meat { background: #ffe0e0; color: #d32f2f; }
        .tag-veg { background: #e0f7e0; color: #388e3c; }
        .tag-seafood { background: #e0f0ff; color: #1976d2; }
        .tag-noodle { background: #fff3e0; color: #e65100; }
        .tag-deli { background: #fce4ec; color: #c62828; }
        .tag-pastry { background: #fff8e1; color: #f57f17; }
        .tag-soup { background: #e8eaf6; color: #283593; }
        .tag-congee { background: #f3e5f5; color: #6a1b9a; }
        .detail-section { text-align: left; margin-top: 15px; }
        .detail-title { font-size: 12px; color: #888; margin-bottom: 5px; }
        .detail-content { font-size: 14px; color: #333; line-height: 1.6; white-space: pre-wrap; }
        .detail-time { 
            display: inline-block; 
            background: #667eea; 
            color: white; 
            padding: 4px 12px; 
            border-radius: 10px; 
            font-size: 12px; 
            margin-bottom: 10px;
        }
        .btn-random {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
            margin-bottom: 15px;
        }
        .btn-random:active { transform: scale(0.98); }
        .panel-tabs {
            display: flex;
            background: white;
            border-radius: 15px 15px 0 0;
            overflow: hidden;
        }
        .panel-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            border: none;
            background: white;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .panel-tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: bold; }
        .panel {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        .panel-content { display: none; }
        .panel-content.active { display: block; }
        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 12px; color: #666; margin-bottom: 4px; display: block; }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 10px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }
        .form-input:focus, .form-textarea:focus { border-color: #667eea; }
        .form-textarea { min-height: 60px; resize: vertical; }
        .form-row { display: flex; gap: 10px; }
        .form-row > * { flex: 1; }
        .btn-add {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .parse-box {
            background: #f8f9fa;
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .parse-box textarea {
            width: 100%;
            min-height: 120px;
            border: none;
            background: transparent;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }
        .parse-hint { font-size: 11px; color: #999; margin-top: 8px; }
        .btn-parse {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .dish-list { max-height: 300px; overflow-y: auto; }
        .dish-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .dish-item:last-child { border-bottom: none; }
        .dish-info { display: flex; align-items: center; gap: 8px; flex: 1; }
        .dish-name { font-size: 14px; }
        .dish-tags { display: flex; gap: 4px; }
        .dish-tag { font-size: 10px; padding: 2px 6px; border-radius: 8px; }
        .btn-delete {
            background: #ff5252;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-edit {
            background: #667eea;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }
        .empty-hint { text-align: center; color: #999; padding: 20px; font-size: 13px; }
        .dish-count { font-size: 12px; color: #999; text-align: right; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 今天吃什么</h1>
        
        <div class="filter-section">
            <div class="filter-title">🏷️ 按类型筛选</div>
            <div class="filter-tags">
                <button class="filter-tag active" data-value="all" onclick="toggleFilter(this,'type')">全部</button>
                <button class="filter-tag" data-value="meat" onclick="toggleFilter(this,'type')">🥩 荤菜</button>
                <button class="filter-tag" data-value="veg" onclick="toggleFilter(this,'type')">🥬 素菜</button>
                <button class="filter-tag" data-value="seafood" onclick="toggleFilter(this,'type')">🦐 海鲜</button>
                <button class="filter-tag" data-value="noodle" onclick="toggleFilter(this,'type')">🍜 面食</button>
                <button class="filter-tag" data-value="deli" onclick="toggleFilter(this,'type')">🍖 熟食</button>
                <button class="filter-tag" data-value="pastry" onclick="toggleFilter(this,'type')">🫓 饼类</button>
                <button class="filter-tag" data-value="soup" onclick="toggleFilter(this,'type')">🥣 汤类</button>
                <button class="filter-tag" data-value="congee" onclick="toggleFilter(this,'type')">🍚 粥类</button>
            </div>
        </div>
        <div class="filter-section">
            <div class="filter-title">🏷️ 按口味筛选</div>
            <div class="filter-tags">
                <button class="filter-tag active" data-value="all" onclick="toggleFilter(this,'taste')">全部</button>
                <button class="filter-tag" data-value="spicy" onclick="toggleFilter(this,'taste')">🌶️ 辣</button>
                <button class="filter-tag" data-value="mild" onclick="toggleFilter(this,'taste')">🫕 不辣</button>
            </div>
        </div>
        <div class="filter-section">
            <div class="filter-title">🏷️ 按菜系筛选</div>
            <div class="filter-tags">
                <button class="filter-tag active" data-value="all" onclick="toggleFilter(this,'style')">全部</button>
                <button class="filter-tag" data-value="sichuan" onclick="toggleFilter(this,'style')">🌶️ 川菜</button>
                <button class="filter-tag" data-value="cantonese" onclick="toggleFilter(this,'style')">🥢 粤菜</button>
                <button class="filter-tag" data-value="dongbei" onclick="toggleFilter(this,'style')">🥟 东北菜</button>
                <button class="filter-tag" data-value="chaoshan" onclick="toggleFilter(this,'style')">🍲 潮汕菜</button>
                <button class="filter-tag" data-value="home" onclick="toggleFilter(this,'style')">🏠 家常菜</button>
            </div>
        </div>
        
        <div class="result-card" id="resultCard">
            <div class="result-emoji" id="resultEmoji">🤔</div>
            <div class="result-name" id="resultName">点击下方按钮</div>
            <div class="result-tags" id="resultTags"></div>
            <div id="resultDetails" style="display:none">
                <div class="detail-time" id="resultTime"></div>
                <div class="detail-section">
                    <div class="detail-title">📋 配料</div>
                    <div class="detail-content" id="resultIngredients"></div>
                </div>
                <div class="detail-section">
                    <div class="detail-title">👨‍🍳 做法</div>
                    <div class="detail-content" id="resultSteps"></div>
                </div>
            </div>
        </div>
        
        <button class="btn-random" onclick="randomDish()">🎲 随机一下</button>
        
        <div class="panel-tabs">
            <button class="panel-tab active" onclick="switchPanel('list', this)">📋 菜品列表</button>
            <button class="panel-tab" onclick="switchPanel('add', this)">➕ 添加菜品</button>
            <button class="panel-tab" onclick="switchPanel('parse', this)">🔍 智能识别</button>
        </div>
        <div class="panel">
            <div class="panel-content active" id="panelList">
                <div class="dish-count" id="dishCount">共 0 道菜</div>
                <div class="dish-list" id="dishList">
                    <div class="empty-hint">还没有菜品，快来添加吧~</div>
                </div>
            </div>
            
            <div class="panel-content" id="panelAdd">
                <div class="form-group">
                    <label class="form-label">菜名 *</label>
                    <input type="text" class="form-input" id="addName" placeholder="例如：红烧肉">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">类型 *</label>
                        <select class="form-select" id="addType">
                            <option value="meat">荤菜</option>
                            <option value="veg">素菜</option>
                            <option value="seafood">海鲜</option>
                            <option value="noodle">面食</option>
                            <option value="deli">熟食</option>
                            <option value="pastry">饼类</option>
                            <option value="soup">汤类</option>
                            <option value="congee">粥类</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">口味 *</label>
                        <select class="form-select" id="addTaste">
                            <option value="mild">不辣</option>
                            <option value="spicy">辣</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">菜系</label>
                    <select class="form-select" id="addStyle">
                        <option value="home">家常菜</option>
                        <option value="sichuan">川菜</option>
                        <option value="cantonese">粤菜</option>
                        <option value="dongbei">东北菜</option>
                        <option value="chaoshan">潮汕菜</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">烹饪时间</label>
                    <input type="text" class="form-input" id="addTime" placeholder="例如：30分钟">
                </div>
                <div class="form-group">
                    <label class="form-label">配料</label>
                    <textarea class="form-textarea" id="addIngredients" placeholder="例如：五花肉500g、冰糖30g、生抽2勺"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">做法步骤</label>
                    <textarea class="form-textarea" id="addSteps" placeholder="1. 五花肉切块&#10;2. 冷水下锅焯水&#10;3. 锅中放油炒糖色..."></textarea>
                </div>
                <button class="btn-add" onclick="addDishManual()">添加菜品</button>
            </div>
            
            <div class="panel-content" id="panelParse">
                <div class="parse-box">
                    <textarea id="parseInput" placeholder="复制粘贴菜谱内容到这里...&#10;&#10;支持格式（带空格分隔）：&#10;菜名：番茄炒蛋 配料：番茄2个、鸡蛋3个 做法：1.番茄切块 2.热锅凉油 时间：10分钟"></textarea>
                    <div class="parse-hint">💡 支持识别：菜名、配料、做法步骤、烹饪时间</div>
                </div>
                <button class="btn-parse" onclick="parseAndAdd()">🔍 识别并添加</button>
                <div id="parseResult" style="margin-top:15px"></div>
            </div>
        </div>
    </div>

    <script>
        const defaultDishes = [
            // === 荤菜 ===
            { name: '红烧肉', type: 'meat', taste: 'mild', style: 'home', time: '60分钟', emoji: '🥩', ingredients: '五花肉500g、冰糖30g、生抽2勺、老抽1勺、料酒2勺、八角2个、桂皮1块、葱姜', steps: '1. 五花肉切块，冷水下锅焯水去血沫\n2. 锅中放少许油，小火炒化冰糖至焦糖色\n3. 放入五花肉翻炒上色\n4. 加入葱姜、八角、桂皮炒香\n5. 加料酒、生抽、老抽，加热水没过肉\n6. 大火烧开转小火炖45分钟\n7. 大火收汁即可' },
            { name: '可乐鸡翅', type: 'meat', taste: 'mild', style: 'home', time: '30分钟', emoji: '🍗', ingredients: '鸡翅8个、可乐1罐、生抽2勺、老抽1勺、姜片、料酒', steps: '1. 鸡翅两面划刀，冷水下锅焯水\n2. 锅中少许油，煎鸡翅至两面金黄\n3. 加姜片、料酒、生抽、老抽\n4. 倒入可乐没过鸡翅\n5. 大火烧开转小火炖15分钟\n6. 大火收汁即可' },
            { name: '葱花煎蛋', type: 'meat', taste: 'mild', style: 'home', time: '5分钟', emoji: '🍳', ingredients: '鸡蛋4个、葱花、盐', steps: '1. 鸡蛋打散，加入葱花和盐搅匀\n2. 锅中油热，倒入蛋液\n3. 中小火煎至底部凝固\n4. 翻面煎至两面金黄出锅' },
            { name: '青椒肉丝', type: 'meat', taste: 'mild', style: 'home', time: '15分钟', emoji: '🫑', ingredients: '青椒2个、猪肉200g、蒜末、生抽、料酒、淀粉', steps: '1. 猪肉切丝，加料酒、生抽、淀粉腌10分钟\n2. 青椒切丝\n3. 锅中油热，滑炒肉丝变色盛出\n4. 锅留底油，炒青椒\n5. 倒入肉丝，加盐调味翻炒出锅' },
            { name: '潮汕牛肉丸汤', type: 'meat', taste: 'mild', style: 'chaoshan', time: '15分钟', emoji: '🧆', ingredients: '牛肉丸200g、芹菜末、盐、胡椒粉', steps: '1. 水烧开，放入牛肉丸\n2. 煮至丸子浮起\n3. 加盐、胡椒粉调味\n4. 撒上芹菜末即可' },
            { name: '鱼香肉丝', type: 'meat', taste: 'spicy', style: 'home', time: '20分钟', emoji: '🐷', ingredients: '猪里脊肉200g、胡萝卜半根、木耳适量、青椒1个、蒜末、豆瓣酱1勺、醋2勺、糖1勺、生抽1勺、淀粉', steps: '1. 猪肉切丝，加料酒、淀粉腌10分钟\n2. 胡萝卜、木耳、青椒切丝\n3. 调碗汁：醋2勺、糖1勺、生抽1勺、淀粉1勺、水2勺\n4. 锅中油热，滑炒肉丝变色盛出\n5. 锅留底油，炒豆瓣酱出红油\n6. 放入蔬菜丝翻炒\n7. 倒入肉丝和碗汁翻匀即可' },
            { name: '回锅肉', type: 'meat', taste: 'spicy', style: 'home', time: '30分钟', emoji: '🥩', ingredients: '五花肉300g、蒜苗2根、青椒1个、豆瓣酱1勺、甜面酱半勺、生抽、糖', steps: '1. 五花肉整块冷水下锅煮20分钟\n2. 捞出放凉切薄片\n3. 蒜苗切段，青椒切块\n4. 锅中不放油，下五花肉煸炒至出油卷曲\n5. 加豆瓣酱、甜面酱炒香\n6. 放入蒜苗和青椒翻炒\n7. 加少许糖、生抽调味' },
            
            // === 素菜 ===
            { name: '番茄炒蛋', type: 'veg', taste: 'mild', style: 'home', time: '10分钟', emoji: '🍅', ingredients: '番茄2个、鸡蛋3个、葱花、盐、糖、生抽', steps: '1. 番茄切块，鸡蛋打散加少许盐\n2. 热锅凉油，倒入蛋液炒散盛出\n3. 锅中放油，炒番茄至出汁\n4. 加入炒好的鸡蛋，加盐、少许糖、生抽调味\n5. 撒葱花出锅' },
            { name: '酸辣土豆丝', type: 'veg', taste: 'spicy', style: 'home', time: '10分钟', emoji: '🥔', ingredients: '土豆1个、干辣椒5个、花椒少许、蒜末、醋2勺、盐', steps: '1. 土豆去皮切丝，泡水洗掉淀粉\n2. 锅中油热，爆香干辣椒和花椒\n3. 放入土豆丝大火翻炒\n4. 加醋、盐调味，炒至断生即可' },
            { name: '蒜蓉空心菜', type: 'veg', taste: 'mild', style: 'home', time: '5分钟', emoji: '🥬', ingredients: '空心菜1把、蒜末5瓣、盐、蚝油', steps: '1. 空心菜洗净切段\n2. 锅中油热，爆香蒜末\n3. 放入空心菜大火快炒\n4. 加盐、蚝油调味，炒软出锅' },
            { name: '清炒豆芽', type: 'veg', taste: 'mild', style: 'home', time: '5分钟', emoji: '🫘', ingredients: '绿豆芽300g、干辣椒3个、蒜末、醋1勺、盐', steps: '1. 豆芽洗净沥干\n2. 锅中油热，爆香蒜末和干辣椒\n3. 放入豆芽大火翻炒\n4. 加醋和盐，炒至断生出锅' },

        const typeNames = { 
            meat: '荤菜', veg: '素菜', seafood: '海鲜', 
            noodle: '面食', deli: '熟食', pastry: '饼类',
            soup: '汤类', congee: '粥类'
        };
        const tasteNames = { spicy: '辣', mild: '不辣' };
        const styleNames = { sichuan: '川菜', cantonese: '粤菜', dongbei: '东北菜', chaoshan: '潮汕菜', home: '家常菜' };

        let dishes = JSON.parse(localStorage.getItem('dishes_v4')) || [...defaultDishes];
        let filters = { type: 'all', taste: 'all', style: 'all' };

        function saveDishes() {
            localStorage.setItem('dishes_v4', JSON.stringify(dishes));
        }

        function toggleFilter(btn, group) {
            filters[group] = btn.dataset.value;
            btn.parentElement.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function getFilteredDishes() {
            return dishes.filter(d => {
                if (filters.type !== 'all' && d.type !== filters.type) return false;
                if (filters.taste !== 'all' && d.taste !== filters.taste) return false;
                if (filters.style !== 'all' && d.style !== filters.style) return false;
                return true;
            });
        }

        function renderDishes() {
            const list = document.getElementById('dishList');
            const filtered = getFilteredDishes();
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-hint">当前筛选没有菜品~</div>';
            } else {
                list.innerHTML = filtered.map(dish => `
                    <div class="dish-item">
                        <div class="dish-info">
                            <span>${dish.emoji || '🍽️'}</span>
                            <span class="dish-name">${dish.name}</span>
                            <div class="dish-tags">
                                <span class="dish-tag tag-${dish.type}">${typeNames[dish.type]}</span>
                                <span class="dish-tag tag-${dish.taste}">${tasteNames[dish.taste]}</span>
                            </div>
                        </div>
                        <button class="btn-edit" onclick="editDish(${dishes.indexOf(dish)})">✏️</button>
                        <button class="btn-delete" onclick="deleteDish(${dishes.indexOf(dish)})">×</button>
                    </div>
                `).join('');
            }
            document.getElementById('dishCount').textContent = `共 ${dishes.length} 道菜`;
        }

        function randomDish() {
            const filtered = getFilteredDishes();
            if (filtered.length === 0) { alert('当前筛选没有菜品，请先添加~'); return; }
            let count = 0;
            const interval = setInterval(() => {
                const dish = filtered[Math.floor(Math.random() * filtered.length)];
                document.getElementById('resultEmoji').textContent = dish.emoji || '🍽️';
                document.getElementById('resultName').textContent = dish.name;
                document.getElementById('resultTags').innerHTML = `
                    <span class="result-tag tag-${dish.type}">${typeNames[dish.type]}</span>
                    <span class="result-tag tag-${dish.taste}">${tasteNames[dish.taste]}</span>
                    <span class="result-tag" style="background:#e8e0f0;color:#6a1b9a">${styleNames[dish.style]}</span>
                `;
                document.getElementById('resultDetails').style.display = 'block';
                document.getElementById('resultTime').textContent = `⏱️ ${dish.time}`;
                document.getElementById('resultIngredients').textContent = dish.ingredients;
                document.getElementById('resultSteps').textContent = dish.steps;
                count++;
                if (count >= 15) clearInterval(interval);
            }, 80);
        }

        function switchPanel(name, btn) {
            document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
        }

        function addDishManual() {
            const name = document.getElementById('addName').value.trim();
            if (!name) { alert('请输入菜名'); return; }
            const emojis = { meat: '🥩', veg: '🥬', seafood: '🦐', noodle: '🍜', deli: '🍖', pastry: '🫓', soup: '🥣', congee: '🍚' };
            dishes.push({
                name,
                type: document.getElementById('addType').value,
                taste: document.getElementById('addTaste').value,
                style: document.getElementById('addStyle').value,
                time: document.getElementById('addTime').value || '未知',
                emoji: emojis[document.getElementById('addType').value],
                ingredients: document.getElementById('addIngredients').value,
                steps: document.getElementById('addSteps').value
            });
            saveDishes();
            renderDishes();
            alert('添加成功！');
            ['addName','addTime','addIngredients','addSteps'].forEach(id => document.getElementById(id).value = '');
        }

        function parseAndAdd() {
            const text = document.getElementById('parseInput').value.trim();
            if (!text) { alert('请粘贴菜谱内容'); return; }
            
            let name = '', ingredients = '', steps = '', time = '';
            const markers = ['菜名', '名称', '配料', '食材', '材料', '做法', '步骤', '方法', '时间'];
            const segments = [];
            
            for (let i = 0; i < markers.length; i++) {
                const idx = text.indexOf(markers[i]);
                if (idx !== -1) {
                    let colonIdx = text.indexOf('：', idx);
                    if (colonIdx === -1 || colonIdx > idx + 4) colonIdx = text.indexOf(':', idx);
                    if (colonIdx === -1 || colonIdx > idx + 4) colonIdx = idx + markers[i].length;
                    segments.push({ marker: markers[i], valueStart: colonIdx + 1 });
                }
            }
            
            segments.sort((a, b) => a.valueStart - b.valueStart);
            
            for (let i = 0; i < segments.length; i++) {
                const start = segments[i].valueStart;
                const end = (i + 1 < segments.length) ? segments[i + 1].valueStart - segments[i + 1].marker.length - 1 : text.length;
                const value = text.substring(start, Math.min(end, text.length)).trim();
                
                const m = segments[i].marker;
                if (m === '菜名' || m === '名称') name = value;
                else if (m === '配料' || m === '食材' || m === '材料') ingredients = value;
                else if (m === '做法' || m === '步骤' || m === '方法') steps = value;
                else if (m === '时间') time = value;
            }
            
            if (!time) { const t = text.match(/(\d+\s*分钟|\d+\s*小时)/); if (t) time = t[1]; }
            if (!name) name = '未命名菜品';
            if (!ingredients) ingredients = '待补充';
            if (!steps) steps = '待补充';
            
            const dish = {
                name: name.slice(0, 20), type: 'meat', taste: 'mild', style: 'home',
                time: time || '未知', emoji: '🍽️', ingredients, steps
            };
            
            document.getElementById('parseResult').innerHTML = `
                <div style="background:#f0f8ff;padding:15px;border-radius:10px;">
                    <div style="font-weight:bold;margin-bottom:8px;">✅ 识别结果：</div>
                    <div><b>菜名：</b>${dish.name}</div>
                    <div><b>时间：</b>${dish.time}</div>
                    <div><b>配料：</b>${dish.ingredients}</div>
                    <div><b>做法：</b>${dish.steps}</div>
                    <div style="margin-top:12px;">
                        <button onclick="confirmParse()" style="background:#28a745;color:white;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;">确认添加</button>
                        <button onclick="document.getElementById('parseResult').innerHTML=''" style="background:#666;color:white;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;margin-left:8px;font-size:14px;">取消</button>
                    </div>
                </div>
            `;
            window._tempDish = dish;
        }

        function confirmParse() {
            if (window._tempDish) {
                dishes.push(window._tempDish);
                saveDishes();
                renderDishes();
                document.getElementById('parseResult').innerHTML = '<div style="color:#28a745;text-align:center;padding:10px;">✅ 添加成功！</div>';
                document.getElementById('parseInput').value = '';
            }
        }

        function deleteDish(index) {
            if (confirm('确定删除？')) {
                dishes.splice(index, 1);
                saveDishes();
                renderDishes();
            }
        }

        function editDish(index) {
            const dish = dishes[index];
            const newName = prompt('菜名', dish.name);
            if (newName !== null) {
                dish.name = newName;
                saveDishes();
                renderDishes();
            }
        }

        renderDishes();
    </script>
</body>
</html>
